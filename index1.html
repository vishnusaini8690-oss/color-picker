    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.35), transparent 30%),
                radial-gradient(circle at 90% 20%, rgba(168, 85, 247, 0.35), transparent 28%),
                radial-gradient(circle at 50% 100%, rgba(236, 72, 153, 0.25), transparent 35%),
                #020617;
            overflow-x: hidden;
        }

        .heading {
            text-align: center;
            color: white;
            padding: 35px 15px 10px;
        }

        .heading h1 {
            font-size: 46px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .heading p {
            color: #cbd5e1;
            font-size: 16px;
        }

        .main {
            width: 100%;
            padding: 28px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 22px;
        }

        .box {
            height: 175px;
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: end;
            align-items: flex-start;
            padding: 18px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.35s ease;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.15),
                    transparent);
        }

        .box:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 25px 65px rgba(0, 0, 0, 0.55);
        }

        .copy-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .color-code {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .copy-text {
            position: relative;
            z-index: 2;
            color: #e2e8f0;
            font-size: 13px;
            margin-top: 6px;
        }

        .toast {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 999;
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
            transform: translateX(140%);
            transition: 0.4s ease;
            font-size: 15px;
            font-weight: 600;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 600px) {
            .heading h1 {
                font-size: 32px;
            }

            .main {
                padding: 18px;
                gap: 16px;
                grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            }

            .box {
                height: 145px;
                border-radius: 22px;
            }

            .toast {
                top: 15px;
                right: 15px;
                left: 15px;
                text-align: center;
                transform: translateY(-140%);
            }

            .toast.show {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="toast" id="toast">Color copied successfully</div>

    <div class="heading">
        <h1>Color Picker</h1>
        <p>Click any color card to copy HEX code</p>
    </div>

    <div class="main"></div>

    <script>
        var maindiv = document.querySelector(".main");
        var toast = document.getElementById("toast");

        function showToast(colorCode) {
            toast.innerText = colorCode + " copied successfully";
            toast.classList.add("show");

            setTimeout(function () {
                toast.classList.remove("show");
            }, 1600);
        }

        for (var i = 0; i < 104; i++) {
            var boxdiv = document.createElement("div");
            boxdiv.classList.add("box");

            var redclr = Math.floor(Math.random() * 255).toString(16).padStart(2, "0");
            var greenclr = Math.floor(Math.random() * 255).toString(16).padStart(2, "0");
            var blueclr = Math.floor(Math.random() * 255).toString(16).padStart(2, "0");

            var newhxcode = "#" + redclr + greenclr + blueclr;

            boxdiv.style.background = newhxcode;

            boxdiv.innerHTML = `
                <div class="copy-icon">
                    <i class="fa-regular fa-copy"></i>
                </div>

                <div class="color-code">${newhxcode}</div>
                <div class="copy-text">Click to Copy</div>
            `;

            maindiv.append(boxdiv);

            boxdiv.addEventListener("click", function () {
                var colorCode = this.querySelector(".color-code").innerText;
                var copyText = this.querySelector(".copy-text");

                navigator.clipboard.writeText(colorCode);

                copyText.innerText = "Copied";
                showToast(colorCode);

                setTimeout(function () {
                    copyText.innerText = "Click to Copy";
                }, 1200);
            });
        }
    </script>

</body>
</html>
